<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пышка CRM — Внутренняя система</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="app-loader" class="loader-container">
        <div class="spinner"></div>
    </div>

    <div id="app" class="app-container hidden">
        <aside id="sidebar" class="sidebar"></aside>

        <div class="main-wrapper">
            <header class="topbar">
                <div class="toggle-menu" id="toggle-menu">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <div class="user-profile">
                    <span id="user-role-badge" class="badge">Роль</span>
                    <span id="user-display-name">Загрузка...</span>
                    <button id="btn-logout" title="Выйти"><i class="fa-solid fa-right-from-bracket"></i></button>
                </div>
            </header>

            <main id="main-content" class="content-container"></main>
        </div>
    </div>

    <div id="auth-screen" class="auth-container hidden">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fa-solid fa-bread-slice"></i>
                <h2>Пышка CRM</h2>
                <p>Шымкент • Внутренний доступ</p>
            </div>
            <form id="auth-form">
                <div class="form-group">
                    <label for="auth-email">Email / Логин</label>
                    <input type="email" id="auth-email" required placeholder="example@pyshka.kz">
                </div>
                <div class="form-group">
                    <label for="auth-password">Пароль</label>
                    <input type="password" id="auth-password" required placeholder="••••••••">
                </div>
                <div id="auth-error" class="auth-error hidden"></div>
                <button type="submit" class="btn btn-primary btn-block">Войти в систему</button>
            </form>
        </div>
    </div>

    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMapDeferred&libraries=places" defer></script>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"
            }
        }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
